<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Ethiopia | AI Guide</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
        <ul>
           <a href="index.html">Home</a>
  <a href="culture.html">Culture</a>
  <a href="history.html">History</a>
  <a href="land_animal.html">Land & Animals</a>
  <a href="resorts.html">Resorts & Hotels</a> 
        </ul>
    </nav>

    <main class="container">
        <section class="panel" style="background-image: url('https://images.unsplash.com/photo-1608634193723-1865aa4416ce?auto=format&fit=crop&q=80');">
            <div class="card">
                <h2>Transport</h2>
                <p>Explore Ethiopia by air or road.</p>
                <button class="explore-btn">Explore</button>
            </div>
        </section>

        <section class="panel" style="background-image: url('https://images.unsplash.com/photo-1634029878815-1bb307302471?auto=format&fit=crop&q=80');">
            <div class="card">
                <h2>Location</h2>
                <p>From the Danakil to the Simiens.</p>
                <button class="explore-btn">Explore</button>
            </div>
        </section>

        <section class="panel" style="background-image: url('https://images.unsplash.com/photo-1629995015838-ea0e985d8d1a?auto=format&fit=crop&q=80');">
            <div class="card">
                <h2>Books</h2>
                <p>Read about our 3,000 year history.</p>
                <button class="explore-btn">Explore</button>
            </div>
        </section>

        <section class="panel" style="background-image: url('https://plus.unsplash.com/premium_photo-1697729902269-70f031f22531?auto=format&fit=crop&q=80');">
            <div class="card">
                <h2>Contact</h2>
                <p>Get in touch with local guides.</p>
                <button class="explore-btn">Explore</button>
            </div>
        </section>
    </main>

    <div class="ai-chat-container">
        <div class="chat-button" onclick="toggleChat()">
            <img src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" width="30" alt="AI">
        </div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">Ethiopia AI Guide</div>
            <div class="chat-body" id="chatBody">
                <p>Hello! Ask me anything about Ethiopia.</p>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Message...">
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
        function toggleChat() {
            document.getElementById('chatWindow').classList.toggle('show');
        }
    </script>
</body>
</html>
